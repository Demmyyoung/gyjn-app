<style>
        /* Base styles from guidance */
        body {
            background-color: #F9F5E7; /* Warm Cream Level 0 */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Progress Bar Animation */
        .progress-bar-fill {
            transition: width 0.4s ease-out;
        }

        /* Chip Animations */
        .chip {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-user-select: none;
        }
        
        .chip:active {
            transform: scale(0.95);
        }

        /* Hide scrollbar for pinned skills row but allow horizontal scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* Custom Input Focus */
        .focus-ring:focus-within {
            border-color: #ff6b35; /* primary-container approx for vibrant orange */
        }
    </style>
</head>
<body class="font-body-md text-on-background min-h-screen flex flex-col relative pb-safe">
<!-- Top Navigation & Progress -->

<div class="flex items-center justify-between mb-stack-md">
<!-- Back Button -->
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<span class="font-label-md text-label-md text-on-surface-variant">Step 5 of 8</span>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</div>
<!-- Segmented Progress Bar -->
<div class="flex gap-1 w-full h-1.5 px-1">
<div class="flex-1 rounded-full bg-primary-container"></div>
<div class="flex-1 rounded-full bg-primary-container"></div>
<div class="flex-1 rounded-full bg-primary-container"></div>
<div class="flex-1 rounded-full bg-primary-container"></div>
<div class="flex-1 rounded-full bg-primary-container relative overflow-hidden">
<div class="absolute inset-0 bg-primary-container"></div>
</div>
<div class="flex-1 rounded-full bg-on-background opacity-10"></div>
<div class="flex-1 rounded-full bg-on-background opacity-10"></div>
<div class="flex-1 rounded-full bg-on-background opacity-10"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile pt-stack-md pb-[100px]">
<!-- Headers -->
<div class="mb-stack-lg">
<h1 class="font-headline-xl text-headline-xl text-on-background mb-stack-sm tracking-tight">What are you great at?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">Tap to add — we've pre-picked a few based on your role.</p>
</div>
<!-- Selected Skills (Pinned Horizontal Row) -->
<div class="mb-stack-lg">
<h2 class="font-label-md text-label-md text-on-surface-variant mb-stack-sm uppercase tracking-wider">Your Skills</h2>
<div class="flex overflow-x-auto gap-2 py-1 no-scrollbar -mx-margin-mobile px-margin-mobile" id="selected-skills-container">
<!-- Pre-selected Chips -->
<button class="chip flex items-center gap-1.5 px-4 py-2 bg-primary-container text-on-primary-container rounded-full font-label-md text-label-md shrink-0 border-2 border-transparent">
                    React
                    <span class="material-symbols-outlined text-[16px]">close</span>
</button>
<button class="chip flex items-center gap-1.5 px-4 py-2 bg-primary-container text-on-primary-container rounded-full font-label-md text-label-md shrink-0 border-2 border-transparent">
                    Python
                    <span class="material-symbols-outlined text-[16px]">close</span>
</button>
<button class="chip flex items-center gap-1.5 px-4 py-2 bg-primary-container text-on-primary-container rounded-full font-label-md text-label-md shrink-0 border-2 border-transparent">
                    Git
                    <span class="material-symbols-outlined text-[16px]">close</span>
</button>
<button class="chip flex items-center gap-1.5 px-4 py-2 bg-primary-container text-on-primary-container rounded-full font-label-md text-label-md shrink-0 border-2 border-transparent">
                    UI/UX Design
                    <span class="material-symbols-outlined text-[16px]">close</span>
</button>

<button class="chip suggestion-chip px-4 py-2 bg-surface-container-lowest border border-outline-variant text-on-background rounded-full font-label-md text-label-md hover:bg-surface-container-low">Docker</button>
<button class="chip suggestion-chip px-4 py-2 bg-surface-container-lowest border border-outline-variant text-on-background rounded-full font-label-md text-label-md hover:bg-surface-container-low">TypeScript</button>

<button class="chip suggestion-chip px-4 py-2 bg-surface-container-lowest border border-outline-variant text-on-background rounded-full font-label-md text-label-md hover:bg-surface-container-low">PostgreSQL</button>
</div>

<button class="w-full h-[56px] bg-primary-container hover:bg-primary text-on-primary-container rounded-full font-label-md text-label-md flex items-center justify-center shadow-lg transition-colors">
            Continue
        </button>
</div>
<!-- Interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const suggestionsContainer = document.getElementById('suggested-skills-container');
            const selectedContainer = document.getElementById('selected-skills-container');
            const searchInput = document.getElementById('skill-search');

            // Handle suggestion click (Move to selected)
            suggestionsContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.suggestion-chip');
                if (!btn) return;

                const skillName = btn.textContent;
                
                // Remove from suggestions
                btn.remove();

                // Create selected chip
                const selectedChip = document.createElement('button');
                selectedChip.className = 'chip flex items-center gap-1.5 px-4 py-2 bg-primary-container text-on-primary-container rounded-full font-label-md text-label-md shrink-0 border-2 border-transparent opacity-0 transform scale-90 transition-all duration-300';
                selectedChip.innerHTML = `
                    ${skillName}
                    <span class="material-symbols-outlined text-[16px]">close</span>
                `;

                // Add to selected container
                selectedContainer.appendChild(selectedChip);
                
                // Animate in
                requestAnimationFrame(() => {
                    selectedChip.classList.remove('opacity-0', 'scale-90');
                });
                
                // Scroll selected container to end
                selectedContainer.scrollTo({
                    left: selectedContainer.scrollWidth,
                    behavior: 'smooth'
                });
            });

            // Handle selected click (Remove/Move back to suggestions)
            selectedContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.chip');
                if (!btn) return;

                const skillName = btn.textContent.trim().replace('close', '').trim(); // hacky way to extract name without icon text
                
                // Animate out
                btn.style.transform = 'scale(0.8)';
                btn.style.opacity = '0';
                
                setTimeout(() => {
                    btn.remove();
                    
                    // Re-add to suggestions if it matches current search
                    const searchTerm = searchInput.value.toLowerCase();
                    if (skillName.toLowerCase().includes(searchTerm) || searchTerm === '') {
                        const suggestionChip = document.createElement('button');
                        suggestionChip.className = 'chip suggestion-chip px-4 py-2 bg-surface-container-lowest border border-outline-variant text-on-background rounded-full font-label-md text-label-md hover:bg-surface-container-low opacity-0 transform scale-90 transition-all duration-300';
                        suggestionChip.textContent = skillName;
                        
                        suggestionsContainer.appendChild(suggestionChip);
                        
                        requestAnimationFrame(() => {
                            suggestionChip.classList.remove('opacity-0', 'scale-90');
                        });
                    }
                }, 200);
            });

            // Simple Search Filter
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const suggestions = suggestionsContainer.querySelectorAll('.suggestion-chip');
                
                suggestions.forEach(chip => {
                    if (chip.textContent.toLowerCase().includes(term)) {
                        chip.style.display = 'inline-block';
                    } else {
                        chip.style.display = 'none';
                    }
                });
            });
        });
    </script>
