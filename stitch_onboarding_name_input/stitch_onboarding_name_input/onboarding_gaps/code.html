<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar (From JSON - Strict Mapping) -->
<header class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-7xl mx-auto bg-surface dark:bg-surface docked full-width top-0 z-50 flat no shadows">
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-high dark:hover:bg-surface-container-highest rounded-full transition-colors p-2 active:scale-95 duration-150 ease-in-out flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-headline-lg font-headline-lg font-bold text-primary dark:text-primary-container">Jinni</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile max-w-2xl mx-auto w-full flex flex-col pb-[120px]">
<!-- Progress Bar -->
<div class="flex gap-1 mb-8 pt-4 w-full">
<div class="h-1.5 flex-1 bg-primary-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-primary-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-primary-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-primary-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-primary-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-primary-container rounded-full"></div>
<div class="h-1.5 flex-1 bg-surface-dim rounded-full opacity-40"></div>
<div class="h-1.5 flex-1 bg-surface-dim rounded-full opacity-40"></div>
</div>
<!-- Header -->
<div class="mb-stack-lg">
<h2 class="text-headline-xl font-headline-xl mb-stack-sm text-on-surface">Any gaps to explain?</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">Totally optional — skip if not needed.</p>
</div>
<!-- Toggle Row -->
<div class="flex items-center justify-between bg-surface-container-lowest p-5 rounded-xl shadow-[0px_4px_20px_rgba(51,51,51,0.08)] mb-stack-lg border border-transparent transition-all cursor-pointer" onclick="toggleGapSection()">
<span class="text-body-md font-body-md font-semibold text-on-surface">I have a gap I'd like to explain</span>
<!-- Toggle Switch (ON State) -->
<button class="relative inline-flex h-8 w-14 items-center rounded-full bg-primary-container transition-colors focus:outline-none" id="gap-toggle">
<span class="inline-block h-6 w-6 translate-x-7 transform rounded-full bg-on-primary transition-transform" id="toggle-thumb"></span>
</button>
</div>
<!-- Expanded Area -->
<div class="flex flex-col gap-stack-lg transition-all duration-300 origin-top" id="expanded-area">
<!-- Chips Wrap -->
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-stack-sm">Common Reasons</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary-fixed text-on-primary-fixed-variant text-label-md font-label-md hover:bg-primary hover:text-on-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">Travel</button>
<button class="px-4 py-2 rounded-full bg-primary-fixed text-on-primary-fixed-variant text-label-md font-label-md hover:bg-primary hover:text-on-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">Health</button>
<button class="px-4 py-2 rounded-full bg-primary text-on-primary text-label-md font-label-md focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">Family</button>
<button class="px-4 py-2 rounded-full bg-primary-fixed text-on-primary-fixed-variant text-label-md font-label-md hover:bg-primary hover:text-on-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">Studies</button>
<button class="px-4 py-2 rounded-full bg-primary-fixed text-on-primary-fixed-variant text-label-md font-label-md hover:bg-primary hover:text-on-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">Freelance</button>
</div>
</div>
<!-- Text Area -->
<div>
<label class="sr-only" for="gap-explanation">Explanation</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-4 text-body-md font-body-md text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all resize-none shadow-[0px_4px_20px_rgba(51,51,51,0.04)]" id="gap-explanation" placeholder="I took time to focus on [Family] between [dates]..." rows="4"></textarea>
</div>
</div>
</main>
<!-- Fixed Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background via-background to-transparent pt-12 pb-6 px-margin-mobile">
<div class="max-w-2xl mx-auto flex flex-col items-center gap-4">
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-full text-label-md font-label-md shadow-lg hover:bg-primary transition-colors active:scale-[0.98]">
                Continue
            </button>
<button class="text-primary text-label-md font-label-md bg-transparent hover:underline px-4 py-2">
                Skip this step
            </button>
</div>
</div>
<!-- Note: BottomNavBar is intentionally suppressed as this is a linear transactional flow. -->
<script>
        // Simple toggle logic for demonstration
        function toggleGapSection() {
            const toggle = document.getElementById('gap-toggle');
            const thumb = document.getElementById('toggle-thumb');
            const area = document.getElementById('expanded-area');
            
            const isOff = toggle.classList.contains('bg-surface-variant');
            
            if (isOff) {
                // Turn ON
                toggle.classList.remove('bg-surface-variant');
                toggle.classList.add('bg-primary-container');
                thumb.classList.remove('translate-x-1');
                thumb.classList.add('translate-x-7');
                area.style.opacity = '1';
                area.style.pointerEvents = 'auto';
                area.style.transform = 'scaleY(1)';
                area.style.height = 'auto';
            } else {
                // Turn OFF
                toggle.classList.remove('bg-primary-container');
                toggle.classList.add('bg-surface-variant');
                thumb.classList.remove('translate-x-7');
                thumb.classList.add('translate-x-1');
                area.style.opacity = '0.5';
                area.style.pointerEvents = 'none';
                // Basic visual feedback for off state
            }
        }
    </script>
