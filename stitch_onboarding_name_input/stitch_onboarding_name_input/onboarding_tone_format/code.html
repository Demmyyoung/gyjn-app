<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Jinni - Tone &amp; Format Preference</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-background": "#1b1c1c",
                      "on-primary-fixed-variant": "#832600",
                      "on-primary": "#ffffff",
                      "surface-container-highest": "#e4e2e1",
                      "on-error": "#ffffff",
                      "primary": "#ab3500",
                      "primary-fixed": "#ffdbd0",
                      "secondary-container": "#e3e0d2",
                      "surface": "#fbf9f8",
                      "on-secondary-container": "#656358",
                      "background": "#fbf9f8",
                      "on-tertiary": "#ffffff",
                      "tertiary": "#6d5b4d",
                      "surface-container-low": "#f6f3f2",
                      "inverse-on-surface": "#f3f0f0",
                      "surface-container-high": "#eae8e7",
                      "outline": "#8d7168",
                      "tertiary-container": "#ab9686",
                      "on-surface": "#1b1c1c",
                      "on-tertiary-fixed-variant": "#544437",
                      "tertiary-fixed": "#f7decc",
                      "surface-container": "#f0eded",
                      "secondary-fixed": "#e6e2d5",
                      "on-secondary-fixed-variant": "#48473d",
                      "on-error-container": "#93000a",
                      "surface-dim": "#dcd9d9",
                      "surface-container-lowest": "#ffffff",
                      "on-primary-container": "#5f1900",
                      "primary-container": "#ff6b35",
                      "on-secondary": "#ffffff",
                      "inverse-primary": "#ffb59d",
                      "surface-variant": "#e4e2e1",
                      "inverse-surface": "#303030",
                      "secondary": "#605f54",
                      "primary-fixed-dim": "#ffb59d",
                      "outline-variant": "#e1bfb5",
                      "on-surface-variant": "#594139",
                      "error": "#ba1a1a",
                      "secondary-fixed-dim": "#cac7b9",
                      "on-tertiary-container": "#3e2f23",
                      "on-tertiary-fixed": "#25190e",
                      "tertiary-fixed-dim": "#dac2b1",
                      "surface-bright": "#fbf9f8",
                      "surface-tint": "#ab3500",
                      "error-container": "#ffdad6",
                      "on-secondary-fixed": "#1c1c14",
                      "on-primary-fixed": "#390c00"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "0.5rem",
                      "stack-lg": "2rem",
                      "margin-mobile": "1.25rem",
                      "gutter": "1rem",
                      "margin-desktop": "2.5rem",
                      "stack-md": "1rem"
              },
              "fontFamily": {
                      "label-md": [
                              "Plus Jakarta Sans"
                      ],
                      "headline-xl": [
                              "Plus Jakarta Sans"
                      ],
                      "body-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "body-md": [
                              "Plus Jakarta Sans"
                      ],
                      "headline-lg": [
                              "Plus Jakarta Sans"
                      ],
                      "caption": [
                              "Plus Jakarta Sans"
                      ]
              },
              "fontSize": {
                      "label-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "letterSpacing": "0.01em",
                                      "fontWeight": "600"
                              }
                      ],
                      "headline-xl": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-lg": [
                              "18px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "400"
                              }
                      ],
                      "body-md": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "600"
                              }
                      ],
                      "caption": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "500"
                              }
                      ]
              }
            }
          }
        }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-surface text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="bg-surface docked full-width top-0 z-50 flex items-center justify-between px-margin-mobile h-16 w-full max-w-7xl mx-auto">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<span class="text-headline-lg font-headline-lg font-bold text-primary">Jinni</span>
<div class="w-10 h-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col w-full max-w-md mx-auto px-margin-mobile pt-4 pb-24">
<!-- Progress Bar -->
<div aria-label="Progress: Step 8 of 8" class="w-full flex gap-1 mb-stack-lg">
<div class="h-2 flex-1 rounded-full bg-primary"></div>
<div class="h-2 flex-1 rounded-full bg-primary"></div>
<div class="h-2 flex-1 rounded-full bg-primary"></div>
<div class="h-2 flex-1 rounded-full bg-primary"></div>
<div class="h-2 flex-1 rounded-full bg-primary"></div>
<div class="h-2 flex-1 rounded-full bg-primary"></div>
<div class="h-2 flex-1 rounded-full bg-primary"></div>
<div class="h-2 flex-1 rounded-full bg-primary"></div>
</div>
<!-- Header Titles -->
<div class="flex flex-col gap-stack-sm mb-stack-lg text-center">
<h1 class="text-headline-xl font-headline-xl text-on-surface">Pick your style.</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">How should your CV sound?</p>
</div>
<!-- Selection Cards -->
<div class="flex flex-col gap-stack-md mb-stack-lg">
<!-- Card 1: Selected -->
<button aria-pressed="true" class="w-full text-left bg-surface-container-lowest rounded-[16px] p-6 shadow-[0px_12px_30px_rgba(51,51,51,0.12)] border-2 border-primary relative overflow-hidden transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface group">
<!-- Checkmark Badge -->
<div class="absolute top-4 right-4 bg-primary text-on-primary rounded-full p-1 shadow-sm">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex items-center gap-4 mb-3">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">bolt</span>
</div>
<h2 class="text-headline-lg font-headline-lg text-on-surface m-0">Concise &amp; Direct</h2>
</div>
<!-- Mini Preview Graphic -->
<div class="pl-16">
<div class="flex flex-col gap-2 opacity-80">
<div class="h-2.5 bg-surface-variant rounded-full w-3/4"></div>
<div class="h-2.5 bg-surface-variant rounded-full w-1/2"></div>
<div class="h-2.5 bg-surface-variant rounded-full w-5/6"></div>
</div>
<p class="text-caption font-caption text-on-surface-variant mt-3 italic">"Led a team of 5 to increase sales by 20% in Q3."</p>
</div>
</button>
<!-- Card 2: Unselected -->
<button aria-pressed="false" class="w-full text-left bg-surface-container-lowest rounded-[16px] p-6 shadow-[0px_4px_20px_rgba(51,51,51,0.08)] border-2 border-transparent hover:border-outline-variant relative overflow-hidden transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-outline focus:ring-offset-2 focus:ring-offset-surface group">
<div class="flex items-center gap-4 mb-3">
<div class="w-12 h-12 rounded-full bg-surface-container text-on-surface-variant flex items-center justify-center shrink-0 group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">menu_book</span>
</div>
<h2 class="text-headline-lg font-headline-lg text-on-surface m-0">Detailed &amp; Descriptive</h2>
</div>
<!-- Mini Preview Graphic -->
<div class="pl-16">
<div class="flex flex-col gap-2 opacity-60">
<div class="h-2.5 bg-surface-variant rounded-full w-full"></div>
<div class="h-2.5 bg-surface-variant rounded-full w-11/12"></div>
<div class="h-2.5 bg-surface-variant rounded-full w-full"></div>
<div class="h-2.5 bg-surface-variant rounded-full w-4/5"></div>
</div>
<p class="text-caption font-caption text-on-surface-variant mt-3 italic">"Spearheaded a comprehensive strategic initiative, guiding a cross-functional team of five professionals..."</p>
</div>
</button>
</div>
<div class="mt-auto pt-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-full text-label-md font-label-md shadow-lg hover:bg-primary-container hover:text-on-primary-container hover:shadow-xl transition-all duration-200 active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                 Generate My CV
             </button>
</div>
</main>
</body></html>
